<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coastal News BD | Coming Soon</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'bangla': ['"Tiro Bangla"', 'serif'],
                        'sans': ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        'brand-blue': '#0ea5e9', // Coastal/Ocean Blue
                        'brand-dark': '#0f172a',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Reset & Background */
        body {
            margin: 0;
            font-family: 'Tiro Bangla', serif;
            background-color: #0f172a;
            color: #ffffff;
            /* High-quality coastal background from Unsplash */
            background-image: url('https://images.unsplash.com/photo-1498092651296-641e88c3b057?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Input Autofill Override */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: white !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative selection:bg-brand-blue selection:text-white">

    <div class="absolute inset-0 bg-gradient-to-b from-brand-dark/80 via-brand-dark/60 to-brand-dark/90 z-0"></div>

    <main class="relative z-10 flex-grow flex items-center justify-center px-4 sm:px-6 py-12">
        <div class="w-full max-w-4xl glass-panel rounded-3xl p-8 md:p-14 text-center opacity-0 animate-fade-in-up">
            
            <div class="mb-8">
                <div class="w-20 h-20 mx-auto bg-brand-blue/20 rounded-full flex items-center justify-center border border-brand-blue/30 shadow-[0_0_30px_rgba(14,165,233,0.3)] animate-pulse-slow mb-4">
                    <svg class="w-10 h-10 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                    </svg>
                </div>
                <h2 class="text-brand-blue font-sans font-bold tracking-[0.2em] text-sm md:text-base uppercase">Coastal News BD</h2>
            </div>

            <h1 class="text-4xl md:text-6xl font-bold mb-6 leading-tight drop-shadow-lg">
                সত্য ও বস্তুনিষ্ঠ সংবাদের<br>নতুন দিগন্ত
            </h1>
            <p class="text-lg md:text-xl text-gray-300 mb-12 max-w-2xl mx-auto leading-relaxed">
                উপকূলীয় অঞ্চল সহ সারা দেশের সর্বশেষ খবর, বিশ্লেষণ এবং বস্তুনিষ্ঠ সাংবাদিকতা নিয়ে আমরা আসছি খুব শীঘ্রই। আমাদের সাথেই থাকুন।
            </p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-3xl mx-auto mb-12">
                <div class="bg-white/5 border border-white/10 rounded-2xl p-4 backdrop-blur-sm">
                    <div id="days" class="font-sans text-4xl md:text-5xl font-bold text-white mb-1">00</div>
                    <div class="text-brand-blue text-sm uppercase tracking-wider font-semibold">দিন</div>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl p-4 backdrop-blur-sm">
                    <div id="hours" class="font-sans text-4xl md:text-5xl font-bold text-white mb-1">00</div>
                    <div class="text-brand-blue text-sm uppercase tracking-wider font-semibold">ঘণ্টা</div>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl p-4 backdrop-blur-sm">
                    <div id="minutes" class="font-sans text-4xl md:text-5xl font-bold text-white mb-1">00</div>
                    <div class="text-brand-blue text-sm uppercase tracking-wider font-semibold">মিনিট</div>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl p-4 backdrop-blur-sm">
                    <div id="seconds" class="font-sans text-4xl md:text-5xl font-bold text-white mb-1">00</div>
                    <div class="text-brand-blue text-sm uppercase tracking-wider font-semibold">সেকেন্ড</div>
                </div>
            </div>

            <div class="max-w-xl mx-auto">
                <form id="notify-form" class="relative group" onsubmit="handleSubscribe(event)">
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="email" id="email" required placeholder="আপনার ইমেইল এড্রেস দিন..." 
                            class="flex-1 bg-slate-800/60 border border-slate-600 text-white px-6 py-4 rounded-xl focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition font-sans text-sm placeholder-gray-400">
                        <button type="submit" id="submit-btn" class="bg-brand-blue hover:bg-sky-400 text-white font-bold px-8 py-4 rounded-xl transition shadow-[0_0_15px_rgba(14,165,233,0.4)] hover:shadow-[0_0_25px_rgba(14,165,233,0.6)] flex justify-center items-center gap-2">
                            <span>যুক্ত হোন</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                    <p id="form-msg" class="text-sm mt-3 hidden transition-all"></p>
                </form>
            </div>
        </div>
    </main>

    <footer class="relative z-10 w-full py-6 px-4 border-t border-white/10 bg-brand-dark/50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-gray-400 text-sm font-sans">
                &copy; <span id="year"></span> CoastalNewsBD.com. All rights reserved.
            </p>
            
            <div class="flex gap-4">
                <a href="#" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-brand-blue transition border border-white/10">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg>
                </a>
                <a href="#" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-blue-600 transition border border-white/10">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg>
                </a>
                <a href="#" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-red-600 transition border border-white/10">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <script>
        // Set current year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // 1. Countdown Timer Logic
        // Set launch date to 30 days from now (You can change this date format: '2026-12-31T00:00:00')
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30); 
        const countDownDate = launchDate.getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            // Math calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Format with leading zeros
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // If countdown is finished
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);

        // 2. Subscription Form Logic (Mock)
        function handleSubscribe(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const email = document.getElementById('email');
            const msg = document.getElementById('form-msg');

            // Simulate loading state
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            btn.disabled = true;

            // Simulate API Call delay
            setTimeout(() => {
                email.value = '';
                btn.innerHTML = `<span>যুক্ত হোন</span><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
                btn.disabled = false;
                
                msg.textContent = "ধন্যবাদ! সফলভাবে সাবস্ক্রাইব করা হয়েছে।";
                msg.classList.remove('hidden', 'text-red-400');
                msg.classList.add('block', 'text-green-400');

                setTimeout(() => {
                    msg.classList.add('hidden');
                    msg.classList.remove('block');
                }, 4000);
            }, 1500);
        }
    </script>
</body>
</html>
